<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      padding: 18px 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .row label {
      font-size: 12px;
      color: #555;
      flex-shrink: 0;
      width: 44px;
    }

    .row select {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      background: #fafafa;
      color: #1a1a1a;
      cursor: pointer;
      outline: none;
      appearance: auto;
    }

    .row select:focus {
      border-color: #FF6B35;
    }

    #scaleRow {
      transition: opacity 0.15s;
    }

    #scaleRow.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin-bottom: 12px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .buttons button {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #pngBtn {
      background: #FF6B35;
      color: #fff;
    }

    #pngBtn:hover:not(:disabled) { background: #e5581f; }

    #pdfBtn {
      background: #1a1a2e;
      color: #fff;
    }

    #pdfBtn:hover:not(:disabled) { background: #2d2d4a; }

    .buttons button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 11.5px;
      line-height: 1.4;
      min-height: 18px;
      color: #666;
      text-align: center;
    }

    #status.error  { color: #c0392b; }
    #status.success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Export Design</h1>
    <p>for Claude Design · claude.ai</p>
  </div>

  <div class="row" id="scaleRow">
    <label>Scale</label>
    <select id="scale">
      <option value="1">1× — original size</option>
      <option value="2">2× — double resolution</option>
      <option value="3">3× — print quality</option>
    </select>
  </div>

  <div class="divider"></div>

  <div class="buttons">
    <button id="pngBtn">Export PNG</button>
    <button id="pdfBtn">Export PDF</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
